services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: agent_sentinel
    ports:
      - "5432:5432"
    volumes:
      - sentinel_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_sentinel"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  sentinel_pg:
